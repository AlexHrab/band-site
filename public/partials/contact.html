<section id="contact" class="contact">
  <div class="container">
    <h2>Зв'яжись з нами</h2>
    <p>Хочеш замовити виступ або маєш питання? Пиши!</p>
    <div class="contact-wrapper">
      <form>
        <div class="name-wrapper">
          <div class="name">
            <label for="name">Ім’я</label>
            <input type="text" id="name" name="name" required />
          </div>
          <div class="name">
            <label for="email">Email</label>
            <input type="email" id="email" name="email" required />
          </div>
        </div>
        <label for="message">Повідомлення</label>
        <textarea
          id="message"
          name="message"
          rows="5"
          placeholder="Розкажи про свої ідеї..."
          required
        ></textarea>

        <button type="submit" class="btn btn-pink">Відправити</button>
      </form>
      <div class="map">
        <p>Наше місцезнаходження</p>
        <iframe
          src="https://maps.google.com/maps?q=kyiv&t=&z=13&ie=UTF8&iwloc=&output=embed"
          loading="lazy"
          aria-label="Карта місцезнаходження гурту в Києві"
          style="border: 0; width: 100%; height: 300px"
          allowfullscreen
          referrerpolicy="no-referrer-when-downgrade"
        ></iframe>
      </div>
    </div>
  </div>
</section>
